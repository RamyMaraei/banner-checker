<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="favicon.png" type="image/png">
  <title>YouTube Banner Checker.V2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121212;
      --text: #f0f0f0;
      --box: #1e1e1e;
      --button: #333;
      --link: #7abaff;
      --accepted: #00c853;
      --rejected: #ff1744;
    }

    body.light {
      --bg: #ffffff;
      --text: #000000;
      --box: #f5f5f5;
      --button: #e0e0e0;
      --link: #1a0dab;
    }

    body {
      font-family: 'Alexandria', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding: 20px;
      margin: 0;
      transition: all 0.3s ease;
    }

    .logo {
      display: block;
      margin: 0 auto 20px auto;
      max-width: 150px;
    }

    .logo-light {
      display: none;
    }

    body.light .logo-dark {
      display: none;
    }

    body.light .logo-light {
      display: block;
    }

    h1 {
      text-align: center;
      color: var(--text);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .controls {
      text-align: center;
      margin-bottom: 10px;
    }

    .search-box {
      position: relative;
      display: inline-block;
    }

    .search-box input[type="text"] {
      padding: 10px 40px 10px 10px;
      font-size: 16px;
      width: 300px;
      border-radius: 5px;
      border: 1px solid #444;
      background-color: var(--box);
      color: var(--text);
      direction: rtl;
    }

    .search-box::before {
      content: "🔍";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text);
    }

    button {
      padding: 10px 20px;
      margin: 5px 5px;
      font-size: 16px;
      background-color: var(--button);
      color: var(--text);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: 'Alexandria', sans-serif;
    }

    button:hover {
      background-color: #666;
    }

    .category-buttons {
      margin-bottom: 10px;
    }

    #channelCount {
      text-align: center;
      color: gray;
      font-size: 14px;
      margin-top: 10px;
    }

    .channel-count-label {
      text-align: center;
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .channel {
      background-color: var(--box);
      padding: 15px;
      margin: 20px auto;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
      max-width: 900px;
    }

    .channel img {
      display: block;
      max-width: 100%;
      margin: 10px auto;
      border-radius: 10px;
    }

    .channel-name {
      font-size: 22px;
      font-weight: bold;
      color: var(--text);
      text-align: center;
    }

    .channel-link {
      text-align: center;
      display: block;
      margin-bottom: 10px;
      font-size: 16px;
      color: var(--link);
      text-decoration: none;
    }

    .status-badge {
      text-align: center;
      font-weight: bold;
      margin: 12px 0;
      font-size: 15px;
    }

    .status-accepted {
      color: var(--accepted);
    }

    .status-rejected {
      color: var(--rejected);
    }

    #backToTop {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 30px;
      z-index: 999;
      font-size: 20px;
      padding: 10px 15px;
      background-color: var(--button);
      color: var(--text);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    #backToTop:hover {
      background-color: #666;
    }
  </style>
</head>
<body>
  <img class="logo logo-dark" src="ALFAN_LOGO-LIGHT-Small.png" alt="Logo Dark" />
  <img class="logo logo-light" src="ALFAN_LOGO-Small.png" alt="Logo Light" />

  <h1 id="pageTitle">منصة فحص بانرات قنوات يوتيوب</h1>

  <div class="controls">
    <div class="category-buttons">
      <button onclick="setCategory('VIP')">VIP</button>
      <button onclick="setCategory('Network')">Network</button>
      <button onclick="setCategory('Music')">Music</button>
    </div>

    <button onclick="toggleLang()">🌐 EN / AR</button>

    <span class="search-box">
      <input type="text" id="searchInput" placeholder="ابحث باسم القناة" oninput="filterChannels()" />
    </span>

    <button onclick="loadChannels()" id="updateBtn">🔄 تحديث</button>
    <button onclick="toggleRejectedFilter()" id="rejectFilterBtn">❌ المخالف فقط</button>
    <button onclick="toggleMode()" id="themeBtn">🌓 تبديل الوضع</button>

    <button onclick="window.open('https://docs.google.com/spreadsheets/d/1CYZxS3TU-L6s4CbqLV0uO9KGYkrn43-0iSyq62w8FGc/edit?usp=sharing', '_blank')" id="editBtn">
      ➕ أضف / عدل قناة
    </button>

    <span id="qrButtonContainer"></span>
  </div>

  <div class="channel-count-label" id="channelLabel"></div>
  <p id="channelCount">جارٍ التحميل...</p>
  <div id="channels">جارٍ التحميل...</div>

  <button id="backToTop" onclick="scrollToTop()" title="العودة لأعلى">🔝</button>

  <footer id="footerText" style="text-align:center; padding: 20px 10px; font-size:14px; color:gray;"></footer>

  <script>
    let category = "VIP";
    let allData = [];
    let currentLang = localStorage.getItem("lang") || "ar";
    let showRejectedOnly = false;

    const translations = {
      ar: {
        title: "منصة فحص بانرات قنوات يوتيوب",
        search: "ابحث باسم القناة",
        update: "🔄 تحديث",
        toggle: "🌓 تبديل الوضع",
        add: "➕ أضف / عدل قناة",
        rejectedOnly: "❌ المخالف فقط",
        showAll: "📋 عرض الكل",
        label: "عدد القنوات بالصفحة",
        footer: "© 2025 شركة الفان – تصميم وتنفيذ رامي مرعي | البيانات مأخوذة من منصة YouTube",
        qr: "قارئ QR",
        acceptedText: "✅ Accepted, compatible with Alfan standards",
        rejectedText: "❌ Rejected, not compatible with Alfan standards",
        countText: (total, rejected) => `تم تحميل ${total} قناة | المرفوض: ${rejected}`
      },
      en: {
        title: "YouTube Banner Checker",
        search: "Search by channel name",
        update: "🔄 Update",
        toggle: "🌓 Toggle Theme",
        add: "➕ Add / Edit Channel",
        rejectedOnly: "❌ Rejected Only",
        showAll: "📋 Show All",
        label: "Number of channels on page",
        footer: "© 2026 Alfan Co. – Designed and developed by Ramy Maraei | V2.0",
        qr: "QR Scanner",
        acceptedText: "✅ Accepted, compatible with Alfan standards",
        rejectedText: "❌ Rejected, not compatible with Alfan standards",
        countText: (total, rejected) => `${total} channels loaded | Rejected: ${rejected}`
      }
    };

    function getApiURL() {
      return `https://script.google.com/macros/s/AKfycby6YQKQ20vJJtBF0GFw-gUhL8EuWyThrbjNjff923qZWUZpeQmYJFzI_ylsxnscCBm4/exec?category=${category}`;
    }

    function setCategory(newCat) {
      category = newCat;
      loadChannels();
    }

    function loadChannels() {
      document.getElementById("channels").innerHTML = "جارٍ التحميل...";
      fetch(getApiURL())
        .then(res => res.json())
        .then(data => {
          allData = data;
          applyFilters();
        })
        .catch(error => {
          document.getElementById("channels").innerHTML = "<p>⚠️ فشل في تحميل البيانات.</p>";
        });
    }

    function applyFilters() {
      const keyword = document.getElementById("searchInput").value.toLowerCase();

      let filtered = allData.filter(c =>
        c["Channel Name"]?.toLowerCase().includes(keyword)
      );

      if (showRejectedOnly) {
        filtered = filtered.filter(c => (c["Alfan Status"] || "").trim() === "Rejected");
      }

      renderChannels(filtered);
    }

    function renderChannels(data) {
      const container = document.getElementById("channels");
      const count = document.getElementById("channelCount");
      const label = document.getElementById("channelLabel");

      container.innerHTML = "";

      const rejectedCount = data.filter(c => (c["Alfan Status"] || "").trim() === "Rejected").length;
      count.textContent = translations[currentLang].countText(data.length, rejectedCount);
      label.textContent = translations[currentLang].label;

      data.forEach(channel => {
        const {
          "Channel ID": id,
          "Channel Name": name,
          "Avatar URL": avatar,
          "Banner URL": banner,
          "Alfan Status": status
        } = channel;

        const url = `https://www.youtube.com/channel/${id}`;
        const cleanStatus = (status || "").trim();
        const isAccepted = cleanStatus === "Accepted";

        const div = document.createElement("div");
        div.className = "channel";
        div.innerHTML = `
          <div class="channel-name">${name}</div>
          <a class="channel-link" href="${url}" target="_blank">${url}</a>

          <div class="status-badge ${isAccepted ? 'status-accepted' : 'status-rejected'}">
            ${isAccepted ? translations[currentLang].acceptedText : translations[currentLang].rejectedText}
          </div>

          <img src="${avatar}" alt="Avatar" style="width:80px; height:80px; border-radius:50%; object-fit:cover; margin:10px auto;" />
          <img src="${banner}" alt="Banner" style="display:block; width:512px; height:80px; object-fit:none; object-position:center center; overflow:hidden; border-radius:10px; margin:10px auto;" />
        `;
        container.appendChild(div);
      });
    }

    function filterChannels() {
      applyFilters();
    }

    function toggleRejectedFilter() {
      showRejectedOnly = !showRejectedOnly;
      document.getElementById("rejectFilterBtn").textContent =
        showRejectedOnly
          ? translations[currentLang].showAll
          : translations[currentLang].rejectedOnly;

      applyFilters();
    }

    function toggleMode() {
      const body = document.body;
      body.classList.toggle("light");
      localStorage.setItem("theme", body.classList.contains("light") ? "light" : "dark");
    }

    function toggleLang() {
      currentLang = currentLang === "ar" ? "en" : "ar";
      localStorage.setItem("lang", currentLang);
      applyLang();
      applyFilters();
    }

    function applyLang() {
      const lang = currentLang;
      document.getElementById("pageTitle").textContent = translations[lang].title;
      document.getElementById("searchInput").placeholder = translations[lang].search;
      document.getElementById("updateBtn").textContent = translations[lang].update;
      document.getElementById("themeBtn").textContent = translations[lang].toggle;
      document.getElementById("editBtn").textContent = translations[lang].add;
      document.getElementById("channelLabel").textContent = translations[lang].label;
      document.getElementById("footerText").textContent = translations[lang].footer;
      document.getElementById("rejectFilterBtn").textContent =
        showRejectedOnly ? translations[lang].showAll : translations[lang].rejectedOnly;

      document.getElementById("qrButtonContainer").innerHTML =
        `<button onclick="window.open('https://ramymaraei.github.io/banner-checker/QRCodeReader.html', '_blank')">📷 ${translations[lang].qr}</button>`;

      if (allData.length > 0) {
        const displayedRejectedCount = allData.filter(c => (c["Alfan Status"] || "").trim() === "Rejected").length;
        document.getElementById("channelCount").textContent =
          translations[lang].countText(allData.length, displayedRejectedCount);
      }
    }

    if (localStorage.getItem("theme") === "light") {
      document.body.classList.add("light");
    }

    applyLang();

    const backToTopBtn = document.getElementById("backToTop");
    window.onscroll = function () {
      if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
        backToTopBtn.style.display = "block";
      } else {
        backToTopBtn.style.display = "none";
      }
    };

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadChannels();
  </script>
</body>
</html>
